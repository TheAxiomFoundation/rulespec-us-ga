format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels/block-1
  summary: |-
    The table provides eligibility levels for selected MAGI coverage groups as of December 1, 2023. Georgia row: Children Medicaid Ages 0-1 205%; Ages 1-5 149%; Ages 6-18 133%; Children Separate CHIP 247%; Pregnant Women Medicaid 220%; Pregnant Women CHIP N/A; Adults (Medicaid) Parent/Caretaker 28%($); Adults (Medicaid) Expansion to Adults No. The MAGI-based rules generally include adjusting an individual’s income by an amount equivalent to a 5% FPL disregard.
rules:
  - name: magi_fpl_disregard_rate
    kind: parameter
    dtype: Rate
    source: CMS Medicaid, CHIP and BHP Eligibility Levels, introductory text
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: us/form/cms/medicaid-chip-bhp-eligibility-levels/block-1
              excerpt: "adjusting an individual’s income by an amount equivalent to a 5% FPL disregard"
    versions:
      - effective_from: '2023-12-01'
        formula: |-
          0.05

